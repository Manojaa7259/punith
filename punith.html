<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Birthday 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    overflow: hidden;
    color: white;
}

/* 🔥 BACKGROUND IMAGE */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -1;
    filter: brightness(0.5);
    transition: 1s;
}

/* PARTICLES */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    opacity: 0.7;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #ff4d6d, black);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#intro h1 {
    font-size: 3rem;
    letter-spacing: 5px;
}

#startBtn {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
    padding-top: 50px;
}

/* NAME ANIMATION */
#name span {
    opacity: 0;
    display: inline-block;
    animation: reveal 0.5s forwards;
}

@keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
}

/* MESSAGE */
#message {
    margin-top: 15px;
    font-size: 1.2rem;
}

/* HEART */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fly 2s linear forwards;
}

@keyframes fly {
    to {
        transform: translateY(-200px) scale(2);
        opacity: 0;
    }
}

/* TIMELINE */
.timeline {
    margin-top: 30px;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND -->
<div id="bg"></div>

<!-- PARTICLES -->
<script>
for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<!-- INTRO -->
<div id="intro">
    <h1>🎁 A Special Surprise</h1>
    <button id="startBtn">Start 🎬</button>
</div>

<!-- MAIN -->
<div id="main">
    <h1 id="name"></h1>
    <p id="message"></p>

    <button onclick="hearts()">Send Love 💖</button>
    <button onclick="fireworks()">Celebrate 🎆</button>

    <div class="timeline">
        <h3>✨ Your Journey Begins Now</h3>
        <p>New dreams 🚀 | New success 🎯 | New life 🌟</p>
    </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>

// 🔥 BACKGROUND SLIDESHOW (YOUR PHOTOS)
const images = [
    "image1.jpg",
    "image2.jpg",
    "image3.jpg"
];

let bgIndex = 0;

function changeBackground() {
    document.getElementById("bg").style.backgroundImage = `url(${images[bgIndex]})`;
    bgIndex = (bgIndex + 1) % images.length;
}
changeBackground();
setInterval(changeBackground, 3000);


// START
document.getElementById("startBtn").onclick=()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    fadeMusic();

    // ⏳ DELAY (SPACE BEFORE TEXT)
    setTimeout(()=>{
        animateName("🎂 Happy Birthday Punith ❤️");
        typeMsg();
    },2000); // 2 seconds delay
};


// NAME ANIMATION
function animateName(text){
    let nameDiv=document.getElementById("name");
    nameDiv.innerHTML="";
    text.split("").forEach((char,i)=>{
        let span=document.createElement("span");
        span.innerText=char;
        span.style.animationDelay=i*0.1+"s";
        nameDiv.appendChild(span);
    });
}

// TYPING MESSAGE
let msg="You are not just growing older, you are growing stronger, smarter and closer to your dreams 🚀🔥";
let i=0;
function typeMsg(){
    if(i<msg.length){
        document.getElementById("message").innerHTML+=msg[i];
        i++;
        setTimeout(typeMsg,40);
    }
}

// HEARTS
function hearts(){
    for(let i=0;i<20;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*window.innerWidth+"px";
        h.style.top=Math.random()*window.innerHeight+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),2000);
    }
}

// FIREWORKS
function fireworks(){
    for(let i=0;i<100;i++){
        let f=document.createElement("div");
        f.style.position="absolute";
        f.style.width="5px";
        f.style.height="5px";
        f.style.background="hsl("+Math.random()*360+",100%,50%)";
        f.style.left=Math.random()*window.innerWidth+"px";
        f.style.top=Math.random()*window.innerHeight+"px";
        f.style.animation="fly 1s linear";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

// MUSIC FADE
function fadeMusic(){
    let music=document.getElementById("music");
    music.volume=0;
    music.play();
    let vol=0;
    let fade=setInterval(()=>{
        if(vol<1){
            vol+=0.05;
            music.volume=vol;
        }else clearInterval(fade);
    },200);
}
</script>

</body>
</html>
